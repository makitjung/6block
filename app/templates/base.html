<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="6block">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <title>{% block title %}6block{% endblock %}</title>
    <script>
        // 페인트 전에 테마를 적용해 깜빡임 방지. 기본은 라이트.
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/static/style.css?v={{ asset_ver() }}">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/today" class="logo">
                <span class="logo-mark"></span>
                <span class="logo-text">6block</span>
            </a>
            <nav class="topnav">
                <a href="/today" class="{% if active == 'today' %}is-active{% endif %}">오늘</a>
                <a href="/week"  class="{% if active == 'week'  %}is-active{% endif %}">주간</a>
            </nav>
            <div class="topbar-right">
                <span id="net-status" class="net-status" hidden></span>
                <span id="now-clock" class="now-clock mono"></span>
                <button type="button" id="theme-toggle" class="theme-toggle" title="라이트/다크 전환" aria-label="테마 전환">◐</button>
            </div>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>

    <aside id="pomo" class="pomo" aria-label="포모도로 타이머">
        <button type="button" class="pomo-dial" title="집중 타이머 (눌러서 컨트롤 열기)">
            <svg class="pomo-ring" viewBox="0 0 100 100" aria-hidden="true">
                <circle class="pomo-ring-track" cx="50" cy="50" r="44"></circle>
                <circle class="pomo-ring-prog" cx="50" cy="50" r="44"></circle>
            </svg>
            <span class="pomo-center">
                <span class="pomo-time mono">—</span>
                <span class="pomo-phase">대기</span>
            </span>
        </button>
        <div class="pomo-controls">
            <div class="pomo-slot mono"></div>
            <div class="pomo-actions">
                <button type="button" class="pomo-start" title="지금 슬롯 끝까지 집중 시작">시작</button>
                <button type="button" class="pomo-skip"  title="현재 단계 스킵">스킵</button>
                <button type="button" class="pomo-stop"  title="중지">중지</button>
            </div>
            <button type="button" class="pomo-auto" title="자동 모드 (정각·30분 자동 시작)">AUTO 모드</button>
        </div>
    </aside>

    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- iOS 자동잠금 방지 폴백: 무음 인라인 영상을 재생하면 화면이 꺼지지 않는다 -->
    <video id="nosleep-video" muted loop playsinline webkit-playsinline preload="auto"
           aria-hidden="true"
           style="position:fixed;left:-2px;bottom:-2px;width:1px;height:1px;opacity:0;pointer-events:none">
        <source src="/static/nosleep.mp4" type="video/mp4">
        <source src="/static/nosleep.webm" type="video/webm">
    </video>

    <script src="/static/app.js?v={{ asset_ver() }}"></script>
</body>
</html>
