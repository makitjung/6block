<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1B1E26"/>
            <stop offset="100%" stop-color="#0A0B0E"/>
        </linearGradient>
        <linearGradient id="hi" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#A5F3FC"/>
            <stop offset="100%" stop-color="#38BDF8"/>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="14" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    <g>
        <rect x="96"  y="112" width="96" height="136" rx="18" fill="#272B36"/>
        <rect x="208" y="112" width="96" height="136" rx="18" fill="#272B36"/>
        <rect x="320" y="112" width="96" height="136" rx="18" fill="#272B36"/>
        <rect x="96"  y="264" width="96" height="136" rx="18" fill="#272B36"/>
        <rect x="208" y="264" width="96" height="136" rx="18" fill="url(#hi)" filter="url(#glow)"/>
        <rect x="320" y="264" width="96" height="136" rx="18" fill="#272B36"/>
    </g>
</svg>
